name: Lager
version: '${version}'
main: no.lager.lager.LagerPlugin
api-version: '1.21.1'
description: OP-only spesielle våpen og rustninger - bare operatorer kan se og bruke dem.
author: Lager

commands:
  lager:
    description: Åpner meny med OP-spesielle våpen og rustninger (kun for operatorer).
    usage: /<command> [list|give <id>|gear|instillinger]
    permission: lager.use
  lagerkiste:
    description: "Åpner admin-kisten med mange OP-items (kun Admin_owner)."
    usage: /<command>
    permission: lager.adminchest
  inventory:
    description: "Se inventory til en spiller: /inventory view <spiller> (kun OP)."
    usage: /<command> view <spiller>
    permission: lager.inventoryview
  kiste:
    description: Åpner OP-kisten med masse OP-gear som aldri blir tom.
    usage: /<command>
    permission: lager.kiste
  frys:
    description: "Admin_owner kan slå frys på/av (fryser spillere og entities rundt deg)."
    usage: /<command>
    permission: lager.frys
  opmode:
    description: Gir midlertidig OP-powers.
    usage: /<command> [sekunder]
    permission: lager.opmode
  troll:
    description: Random troll-effekt på spiller.
    usage: /<command> <spiller>
    permission: lager.troll
  boost:
    description: Gir midlertidig OP-kit.
    usage: /<command> [spiller]
    permission: lager.boost
  arena:
    description: Teleporterer til PvP-arena.
    usage: /<command>
    permission: lager.arena
  spectateplus:
    description: Spectate uten at spiller vet.
    usage: /<command> <spiller>
    permission: lager.spectateplus
  vault:
    description: Åpner din private vault.
    usage: /<command>
    permission: lager.vault
  sethome:
    description: Setter home-slot (1-3) for deg.
    usage: /<command> <1|2|3>
    permission: lager.sethome
  home:
    description: Teleporterer deg til home-slot (1-3).
    usage: /<command> <1|2|3>
    permission: lager.home
  rankitem:
    description: Admin_owner lager rank-item som gir plugin-rank ved høyreklikk.
    usage: /<command> create <rank>
    permission: lager.rankitem
  faderfaling:
    description: Admin_owner slår Slow Falling ved join på/av.
    usage: /<command> <på|av>
    permission: lager.adminbuff
  fireresistance:
    description: Admin_owner slår Fire Resistance ved join på/av.
    usage: /<command> <på|av>
    permission: lager.adminbuff
  blind:
    description: Gjør skjermen mørk for en spiller (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  levitate:
    description: Får spilleren til å flyte oppover (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  anvil:
    description: Slipp en ambolt over spilleren (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  scare:
    description: Vis jump-scare til spiller (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  spin:
    description: Få spilleren til å snurre (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  spam:
    description: Fyll chatten til spilleren med tull (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  jail:
    description: Lås spiller inne i glassbur (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  tnt:
    description: Spawn TNT ved føttene til spilleren (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  invclear:
    description: Tøm inventaret til en spiller (OP).
    usage: /<command> <spiller>
    permission: lager.opfun
  mute:
    description: Hindre spiller i å skrive i chat (OP).
    usage: /<command> <spiller>
    permission: lager.mute
  spawnvillager:
    description: Spawn en troll-landsbyboer (scammer, jester, tax, boomer, glitch). Kun OP.
    usage: /<command> <type>
    permission: lager.spawnvillager
  tardis:
    description: TARDIS-hus – lite utvendig, stort innvendig. setentrance | setinterior | setexit | setdoor | info
    usage: /<command> <setentrance|setinterior|setexit|setdoor|info>
    permission: lager.tardis

permissions:
  lager.use:
    description: Tillater bruk av /lager (OP-items).
    default: op
  lager.adminchest:
    description: Tillater åpning av admin-kisten (kun for Admin_owner).
    default: op
  lager.kiste:
    description: Tillater åpning av OP-kisten (uendelig OP-gear).
    default: op
  lager.frys:
    description: "Tillater /frys, kun Admin_owner i praksis."
    default: op
  lager.opmode:
    description: Tillater /opmode.
    default: op
  lager.troll:
    description: Tillater /troll.
    default: op
  lager.boost:
    description: Tillater /boost.
    default: op
  lager.arena:
    description: Tillater /arena.
    default: op
  lager.spectateplus:
    description: Tillater /spectateplus.
    default: op
  lager.vault:
    description: Tillater /vault (privat vault).
    default: true
  lager.sethome:
    description: Tillater /sethome <1|2|3>.
    default: true
  lager.home:
    description: Tillater /home <1|2|3>.
    default: true
  lager.rankitem:
    description: Tillater /rankitem (kun Admin_owner i praksis).
    default: op
  lager.adminbuff:
    description: Tillater /faderfaling og /fireresistance (kun Admin_owner i praksis).
    default: op
  lager.inventoryview:
    description: Tillater /inventory view (se andres inventory).
    default: op
  lager.opfun:
    description: Tillater OP-troll-kommandoer (blind, levitate, anvil, scare, spin, spam, jail, tnt, invclear).
    default: op
  lager.mute:
    description: Tillater /mute (mute spillere i chat).
    default: op
  lager.spawnvillager:
    description: Tillater å spawne troll-landsbyboere.
    default: op
  lager.tardis:
    description: Tillater TARDIS-hus (lite utvendig, stort innvendig).
    default: op
